packages:
  - .

allowBuilds:
  esbuild: false
  unrs-resolver: false

minimumReleaseAge: 10080 # 7 days in minutes

minimumReleaseAgeExclude:
  - fast-xml-builder@1.1.7
  - hono@4.12.18

overrides:
  '@types/node': ^24
  chokidar: '>=5'
  eslint-import-resolver-typescript: '^4.4.4'
  fast-xml-builder@<=1.1.6: ^1.1.7
  hono@<4.12.18: ^4.12.18
  semver: '>=7'

trustPolicy: no-downgrade
